name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, test, build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm ci verlangt ein passendes package-lock.json. Falls das Lockfile
      # nach lokalen Edits nicht synchron ist, Fallback auf npm install.
      - name: Install dependencies
        shell: bash
        run: npm ci || npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Build (Renderer)
        run: npm run build

      - name: Audit (advisory only)
        run: npm audit --audit-level=high
        continue-on-error: true

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: npm ci || npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      # Helper-Build kann scheitern, falls der Runner kein passendes
      # csc.exe hat. In dem Fall packagen wir die App ohne nativen Helper -
      # das Setup laeuft trotzdem, nur der File-Anhang-Modus ist im
      # Endprodukt nicht funktional. Damit das CI nicht hart abbricht,
      # markieren wir den Step als "continue-on-error".
      - name: Build native helper (.NET 4.x csc) - optional
        run: npm run build:helper
        continue-on-error: true

      # electron-builder verlangt, dass extraResources.from existiert.
      # Falls der Helper-Build fehlte, Stub-Verzeichnis anlegen, damit
      # electron-builder nicht abbricht.
      - name: Ensure helper publish dir exists
        shell: pwsh
        run: |
          $publish = "native/ClipboardHelper/publish"
          if (-not (Test-Path $publish)) {
            New-Item -ItemType Directory -Force -Path $publish | Out-Null
            "Helper konnte im CI nicht gebaut werden." | Out-File -Encoding utf8 (Join-Path $publish 'README.txt')
          }

      - name: Build Electron (NSIS + Portable)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage release assets
        shell: pwsh
        run: |
          $stage = "${{ github.workspace }}\release"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem dist-electron -Filter '*.exe' | Copy-Item -Destination $stage -Force
          if (Test-Path BENUTZERHANDBUCH.pdf) { Copy-Item BENUTZERHANDBUCH.pdf $stage -Force }
          if (Test-Path BENUTZERHANDBUCH.docx) { Copy-Item BENUTZERHANDBUCH.docx $stage -Force }
          if (Test-Path LIESMICH.txt) { Copy-Item LIESMICH.txt $stage -Force }
          $version = "${{ github.ref_name }}".TrimStart('v')
          $portable = Get-ChildItem $stage -Filter '*portable*.exe' | Select-Object -First 1
          if ($portable) {
            $tmp = Join-Path $env:RUNNER_TEMP "CopyMail-$version"
            New-Item -ItemType Directory -Force -Path $tmp | Out-Null
            Copy-Item $portable.FullName (Join-Path $tmp 'CopyMail.exe')
            if (Test-Path BENUTZERHANDBUCH.pdf) { Copy-Item BENUTZERHANDBUCH.pdf $tmp }
            if (Test-Path LIESMICH.txt) { Copy-Item LIESMICH.txt $tmp }
            $setup = Get-ChildItem $stage -Filter '*Setup*.exe' | Select-Object -First 1
            if ($setup) {
              $sub = Join-Path $tmp '_Installer'
              New-Item -ItemType Directory -Force -Path $sub | Out-Null
              Copy-Item $setup.FullName $sub
            }
            $zipPath = Join-Path $stage "CopyMail-$version.zip"
            Compress-Archive -Path "$tmp\*" -DestinationPath $zipPath -CompressionLevel Optimal
          }
          Get-ChildItem $stage | ForEach-Object { Write-Host "asset: $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)" }

      - name: Extract release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $notesPath = "${{ github.workspace }}\release\RELEASE_NOTES.md"
          if (-not (Test-Path CHANGELOG.md)) {
            "Keine CHANGELOG.md gefunden." | Out-File -Encoding utf8 $notesPath
            exit 0
          }
          $content = Get-Content -Raw -Encoding utf8 CHANGELOG.md
          # Sucht "## [<version>]" bis zur nächsten "## [..." Sektion
          $pattern = "(?ms)## \[$([regex]::Escape($version))\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          $m = [regex]::Match($content, $pattern)
          if ($m.Success) {
            $notes = $m.Groups[1].Value.Trim()
            # Horizontal-Linien aus dem CHANGELOG weglassen
            $notes = $notes -replace "(?m)^---\s*$", ""
            $notes | Out-File -Encoding utf8 $notesPath
            Write-Host "Release-Notes fuer v$version extrahiert ($($notes.Length) Zeichen)."
          } else {
            "Keine Notes fuer v$version in CHANGELOG.md - siehe Commit-History." | Out-File -Encoding utf8 $notesPath
            Write-Host "WARN: Kein CHANGELOG-Abschnitt fuer v$version gefunden."
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release/RELEASE_NOTES.md
          # Fallback: wenn der Body leer ist, fuegt GitHub die Auto-Notes an.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

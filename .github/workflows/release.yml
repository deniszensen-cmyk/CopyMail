name: Release

# Wird ausgelöst, sobald ein Tag wie v1.2.0, v1.3.0 etc. gepusht wird.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: CopyMail-v2

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CopyMail-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build native helper (.NET 4.x csc)
        run: npm run build:helper
        # Hinweis: windows-latest enthält das .NET Framework Developer Pack
        # 4.x. Falls dein Forks ohne csc.exe baut, ergänze hier ein Setup-Step
        # für die VS Build Tools.

      - name: Build Electron (NSIS + Portable)
        run: npm run electron:build:win
        env:
          # electron-builder publish=never: GitHub-Release erzeugt der
          # nachfolgende softprops-Step. Damit haben wir vollen Zugriff
          # auf alle Artefakte für den Anhang.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder verlangt explizit "never" wenn man nicht
          # automatisch zu GitHub publishen will.
          # Setze stattdessen "always" wenn der publish-Workflow von
          # electron-builder selbst übernehmen soll – dann brauchst du
          # den softprops-Step weiter unten nicht.
          # Wir bleiben auf "never" für mehr Kontrolle.
          # publish-Flag wird über CLI gesteuert; siehe electron:build:win.

      - name: Stage release assets
        shell: pwsh
        run: |
          $stage = "${{ github.workspace }}\release"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item CopyMail-v2\dist-electron\*.exe $stage -Force
          if (Test-Path BENUTZERHANDBUCH.pdf) { Copy-Item BENUTZERHANDBUCH.pdf $stage -Force }
          if (Test-Path BENUTZERHANDBUCH.docx) { Copy-Item BENUTZERHANDBUCH.docx $stage -Force }
          if (Test-Path LIESMICH.txt) { Copy-Item LIESMICH.txt $stage -Force }
          # Portable + Doku zusätzlich als ZIP für Endnutzer
          $version = "${{ github.ref_name }}".TrimStart('v')
          $zipName = "CopyMail-$version.zip"
          $zipPath = Join-Path $stage $zipName
          $portable = Get-ChildItem $stage -Filter '*portable*.exe' | Select-Object -First 1
          if ($portable) {
            $tmp = Join-Path $env:RUNNER_TEMP "CopyMail-$version"
            New-Item -ItemType Directory -Force -Path $tmp | Out-Null
            Copy-Item $portable.FullName (Join-Path $tmp 'CopyMail.exe')
            if (Test-Path BENUTZERHANDBUCH.pdf) { Copy-Item BENUTZERHANDBUCH.pdf $tmp }
            if (Test-Path LIESMICH.txt) { Copy-Item LIESMICH.txt $tmp }
            $setup = Get-ChildItem $stage -Filter '*Setup*.exe' | Select-Object -First 1
            if ($setup) {
              $sub = Join-Path $tmp '_Installer'
              New-Item -ItemType Directory -Force -Path $sub | Out-Null
              Copy-Item $setup.FullName $sub
            }
            Compress-Archive -Path "$tmp\*" -DestinationPath $zipPath -CompressionLevel Optimal
          }
          Get-ChildItem $stage | ForEach-Object { Write-Host "asset: $($_.Name)" }
        working-directory: ${{ github.workspace }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
